services:
  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${HOST_PORT_POSTGRES:-5432}:5432"
    networks:
      - oftalmologia_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Django Backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    ports:
      - "${HOST_PORT_BACKEND:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - oftalmologia_net
    command: python manage.py runserver 0.0.0.0:8000

  # ---- Next.js Frontend ----
  # Bind mount + volumenes: sin entrypoint, node_modules puede quedar vacío y Tailwind no aplica
  # (login con texto blanco sobre fondo claro, sin grid/flex). Ver frontend/docker-entrypoint.sh
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    ports:
      - "${HOST_PORT_FRONTEND:-3000}:3000"
    depends_on:
      - backend
    networks:
      - oftalmologia_net
    command: ["sh", "-c", "exec npm run dev -- --hostname ${NEXT_DEV_HOSTNAME:-0.0.0.0}"]

  # ---- Mailhog (Captura de emails en desarrollo) ----
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "${HOST_PORT_MAILHOG_SMTP:-1025}:1025"   # SMTP — Django envía correos aquí
      - "${HOST_PORT_MAILHOG_UI:-8025}:8025"     # Web UI Mailhog (puerto = HOST_PORT_MAILHOG_UI)
    networks:
      - oftalmologia_net

  # ---- Backup Scheduler (Backups automáticos) ----
  backup-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "0"
      BOOTSTRAP_PUBLIC_SCHEMA: "0"
      BOOTSTRAP_TENANTS: "0"
      RUN_SEEDERS: "0"
      RUN_COLLECTSTATIC: "0"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - oftalmologia_net
    command: >
      sh -c "while true; do
        python manage.py backup_automatico;
        sleep 3600;
      done"

volumes:
  postgres_data:
  backend_static:
  backend_media:
  frontend_node_modules:
  frontend_next_cache:

networks:
  oftalmologia_net:
    driver: bridge
