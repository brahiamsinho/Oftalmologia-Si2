# Producción — Azure VM / dominio público
# Reemplazá server_name si usás otro FQDN (cloudapp.azure.com o dominio propio).

upstream backend_upstream {
    server backend:8000;
}

upstream frontend_upstream {
    server frontend:3000;
}

server {
    listen 80;
    server_name oftalmologia-si2.westus3.cloudapp.azure.com;

    client_max_body_size 25m;

    # API pública (schema public): /api/public/...
    location /api/ {
        proxy_pass http://backend_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # API multi-tenant: /t/<slug>/api/...
    location /t/ {
        proxy_pass http://backend_upstream/t/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Django admin (opcional; restringir por IP en producción real)
    location /admin/ {
        proxy_pass http://backend_upstream/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Archivos estáticos/media servidos por Django (si aplica)
    location /static/ {
        proxy_pass http://backend_upstream/static/;
        proxy_set_header Host $host;
    }

    location /media/ {
        proxy_pass http://backend_upstream/media/;
        proxy_set_header Host $host;
    }

    # Portainer (opcional: docker-compose.portainer.yml)
    location /portainer/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $portainer_backend portainer;
        proxy_pass http://$portainer_backend:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # Frontend Next.js (todo lo demás)
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
