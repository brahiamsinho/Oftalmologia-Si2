# Producción con HTTPS (Let's Encrypt) — montar /etc/letsencrypt en el contenedor nginx.
# Generar certs antes: ./scripts/azure/setup-https.sh TU-DOMINIO tu@email.com

upstream backend_upstream {
    server backend:8000;
}

upstream frontend_upstream {
    server frontend:3000;
}

# Redirigir HTTP → HTTPS
server {
    listen 80;
    server_name oftalmologia-si2.westus3.cloudapp.azure.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name oftalmologia-si2.westus3.cloudapp.azure.com;

    ssl_certificate     /etc/letsencrypt/live/oftalmologia-si2.westus3.cloudapp.azure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oftalmologia-si2.westus3.cloudapp.azure.com/privkey.pem;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://backend_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }

    location /t/ {
        proxy_pass http://backend_upstream/t/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }

    location /admin/ {
        proxy_pass http://backend_upstream/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /static/ {
        proxy_pass http://backend_upstream/static/;
        proxy_set_header Host $host;
    }

    location /media/ {
        proxy_pass http://backend_upstream/media/;
        proxy_set_header Host $host;
    }

    # Portainer (opcional: docker-compose.portainer.yml)
    location /portainer/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $portainer_backend portainer;
        proxy_pass http://$portainer_backend:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
