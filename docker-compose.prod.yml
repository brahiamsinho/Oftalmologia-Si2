# Overlay de producción — Azure VM / servidor real
#
# Uso (con .env ya generado):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# O automatizado:
#   ./scripts/azure/deploy.sh oftalmologia-si2.westus3.cloudapp.azure.com
#
# Qué cambia vs desarrollo:
#   - Imágenes prod (Dockerfile.prod) con build embebido
#   - Gunicorn en backend
#   - Next.js standalone (build en docker build, no al start)
#   - Solo nginx expone puerto 80
#   - Sin bind mounts de código fuente
#   - Mailhog activo (UI en :8025; SMTP interno mailhog:1025)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: >
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      --timeout 120
      --access-logfile -
      --error-logfile -
    environment:
      DJANGO_DEBUG: "False"
      RUN_COLLECTSTATIC: "1"
    volumes: !reset
      - backend_static:/app/staticfiles
      - backend_media:/app/media
    ports: !reset []

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-OftalmoCRM}
    environment:
      NODE_ENV: production
    entrypoint: []
    command: ["node", "server.js"]
    volumes: !reset []
    ports: !reset []

  db:
    ports: !reset []

  mailhog:
    # SMTP solo en red Docker (backend → mailhog:1025). UI web expuesta para revisar correos.
    ports:
      - "${HOST_PORT_MAILHOG_UI:-8025}:8025"

  recordatorios-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    volumes: !reset []

  backup-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    volumes: !reset
      - backend_media:/app/media

  nginx:
    volumes:
      - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
